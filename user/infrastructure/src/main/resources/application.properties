# ==========================================
# 1. Configuracoes de Conexao do H2
# ==========================================
# Cria o banco em memoria (os dados somem ao reiniciar a aplicacao)
spring.datasource.url=jdbc:h2:mem:meubancodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# 2. Console do H2 (Para voce ver os dados no navegador)
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# 3. Execucao dos arquivos .sql (MUITO IMPORTANTE)
# ==========================================
# Diz pro Spring sempre rodar o schema.sql e o data.sql
spring.sql.init.mode=always

# ==========================================
# 4. Configuracaao do JPA / Hibernate (Se estiver usando)
# ==========================================
# Evita que o Hibernate tente recriar a tabela e ignore seu schema.sql
spring.jpa.hibernate.ddl-auto=none
